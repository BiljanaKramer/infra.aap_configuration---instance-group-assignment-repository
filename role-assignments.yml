---
- name: Assign InstanceGroup Use role to a team
  hosts: localhost
  gather_facts: false

  vars:
    controller_hostname: "https://vm-10-1-230-16.ans.cee.ral3.lab.eng.rdu2.redhat.com"
    controller_username: "admin"
    controller_password: "admin"
    controller_validate_certs: false

    controller_instance_groups:
      - name: my_instance_group
        description: Example instance group
        policy_instance_percentage: 100
        is_container_group: false

        # Role assignment section
        roles:
          - team: my_team
            role: use   # This maps to "InstanceGroup Use"

  roles:
    - infra.aap_configuration.controller_instance_groups
