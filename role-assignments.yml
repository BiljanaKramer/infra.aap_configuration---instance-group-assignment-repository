---
- name: Assign InstanceGroup Use role to a team
  hosts: localhost
  gather_facts: false

  vars:
    controller_host: "https://vm-10-1-230-16.ans.cee.ral3.lab.eng.rdu2.redhat.com"
    controller_username: "admin"
    controller_password: "admin"
    controller_validate_certs: false

    controller_instance_groups:
      - name: my_instance_group
        roles:
          - team: my_team
            role: use   # "InstanceGroup Use"

  roles:
    - infra.aap_configuration.controller_instance_groups
