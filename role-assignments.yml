---
- name: Assign InstanceGroup Use role to a team
  hosts: localhost
  gather_facts: false

  vars:
    aap_hostname: "vm-10-1-230-59.ans.cee.ral3.lab.eng.rdu2.redhat.com"
    aap_username: "admin"
    aap_password: "gateway"
    aap_validate_certs: false

    controller_instance_groups:
      - name: "newInstanceGroup"
        roles:
          use:
            teams: 
              - "newTeam"

  roles:
    - infra.aap_configuration.controller_instance_groups
